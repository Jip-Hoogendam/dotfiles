# Monitor wiki https://wiki.hyprland.org/0.45.0/Configuring/Monitors/

monitor = , preferred, auto, 1.07
monitor = desc:Dell Inc. DELL P3425WE FPRPY54, 3440x1440@99.98Hz, 0x0, 1.07, vrr, 0
# hl.monitor({
#     output = "eDP-1",
#     mode = "2560x1440@120.00Hz",
#     position = "2560x0",
#     scale = 1.07,
#   })
#
# monitor {
#   output = "DP-1"
#     mode = "3440x1440@99.98Hz",
#     position = "0x0",
#     scale = 1.07,
#   }
cursor {

no_hardware_cursors = true

}

# If you need to scale things like steam etc, please uncomment these lines.
# Adjust GDK_SCALE accordingly to your liking.
xwayland {
  force_zero_scaling = true       # Unscale XWayland
}

env = GDK_SCALE, 1                   # GDK Scaling Factor
