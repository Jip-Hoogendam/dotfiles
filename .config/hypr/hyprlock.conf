general{
    hide_cursor = true
  }

animations{
    enabled = true
    
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
  }


background{
    monitor = 
    path = screenshot
    blur_passes = 3
  }

input-field {
    monitor =
    size = 20%, 15%
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(FFC6FF00)
    check_color = rgba(F5BDE600)
    fail_color = rgba(FF8FB100)

    font_color = rgb(255, 198, 255)
    fade_on_empty = false

    font_family = $font
    font_size = 3
    placeholder_text = (◕‿◕✿)
    fail_text = (>_<✿)

    # uncomment to use a letter instead of a dot to indicate the typed password
    dots_text_format =:3
    dots_size = 0.3
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    hide_input = false

    position = 0, -20
    halign = center
    valign = center
}


# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    color = rgb(255, 198, 255)
    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font
    color = rgb(255, 198, 255)
    
    position = -30, -150
    halign = right
    valign = top
}

#VANITY
label{
  monitor =
  text = You like snooping on others pc's dont you ?
  font_size = 20 
  font_family = $font 
  color = rgb(255, 198, 255)
  
  position = 0, -100
  halign = center
  valign = center #Bottoms be like 
}

